<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>學生數據趨勢追蹤 — Abby Eat Life</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #FDFBF7;
    font-family: 'Noto Sans TC', sans-serif;
    color: #3D3229;
    padding-bottom: 48px;
  }

  /* Header */
  .header {
    background: #3D3229;
    padding: 20px 28px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-sub {
    font-size: 0.7rem;
    color: #C17F59;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .header-title {
    font-size: 1.25rem;
    color: #FDFBF7;
    font-family: 'Playfair Display', serif;
    margin-top: 2px;
  }
  .btn-reset {
    background: transparent;
    border: 1px solid #8B9E7E;
    color: #8B9E7E;
    border-radius: 8px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 0.75rem;
    font-family: 'Noto Sans TC', sans-serif;
    display: none;
  }
  .btn-reset:hover { background: #8B9E7E22; }

  /* Content */
  .content {
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 20px 0;
  }

  /* Input card */
  .input-card {
    background: #fff;
    border: 1px solid #e8e0d8;
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 2px 12px #00000008;
    margin-bottom: 20px;
  }
  .field-label {
    font-size: 0.75rem;
    color: #888;
    display: block;
    margin-bottom: 6px;
  }
  .field-label span { color: #bbb; margin-left: 6px; }
  input[type="text"], textarea {
    width: 100%;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 0.9rem;
    font-family: 'Noto Sans TC', sans-serif;
    outline: none;
    color: #3D3229;
    transition: border-color 0.2s;
    background: #fff;
  }
  input[type="text"]:focus, textarea:focus { border-color: #8B9E7E; }
  .input-field-wrap { margin-bottom: 16px; }
  textarea {
    font-family: monospace;
    font-size: 0.82rem;
    resize: vertical;
    line-height: 1.7;
    min-height: 120px;
  }
  .hint { font-size: 0.7rem; color: #bbb; margin-bottom: 14px; }
  .btn-row { display: flex; gap: 10px; }
  .btn-sample {
    flex: 0 0 auto;
    background: transparent;
    border: 1px solid #C17F59;
    color: #C17F59;
    border-radius: 8px;
    padding: 9px 16px;
    cursor: pointer;
    font-size: 0.8rem;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .btn-sample:hover { background: #C17F5911; }
  .btn-load {
    flex: 1;
    background: #ccc;
    border: none;
    color: #fff;
    border-radius: 8px;
    padding: 9px 16px;
    cursor: not-allowed;
    font-size: 0.85rem;
    font-weight: 600;
    font-family: 'Noto Sans TC', sans-serif;
    transition: background 0.2s;
  }
  .btn-load.ready { background: #8B9E7E; cursor: pointer; }
  .btn-load.ready:hover { background: #7a8e6d; }

  /* Chart area */
  .chart-area { display: none; }
  .student-header {
    margin-bottom: 18px;
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
  }
  .student-name {
    font-size: 1.3rem;
    font-family: 'Playfair Display', serif;
    color: #3D3229;
  }
  .student-period { font-size: 0.75rem; color: #aaa; }

  /* Metric cards */
  .metric-cards { display: flex; gap: 10px; margin-bottom: 20px; }
  .metric-card {
    flex: 1;
    min-width: 0;
    border: 2px solid transparent;
    border-radius: 14px;
    background: #faf9f7;
    padding: 14px 12px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    box-shadow: 0 1px 4px #00000010;
  }
  .metric-card.active { box-shadow: 0 2px 12px var(--card-shadow); }
  .metric-label { font-size: 0.72rem; color: #888; margin-bottom: 4px; }
  .metric-value {
    font-size: 1.4rem;
    font-weight: 700;
    color: #2d2418;
    font-family: 'Playfair Display', serif;
  }
  .metric-unit { font-size: 0.75rem; color: #aaa; font-weight: 400; margin-left: 2px; }
  .delta-badge {
    display: inline-block;
    font-size: 0.7rem;
    padding: 1px 7px;
    border-radius: 20px;
    font-weight: 600;
    margin-left: 6px;
  }
  .delta-good { background: #e8f0e5; color: #5a7a50; }
  .delta-bad  { background: #faeee6; color: #b85c33; }

  /* Chart box */
  .chart-box {
    background: #fff;
    border: 1px solid #e8e0d8;
    border-radius: 16px;
    padding: 20px 16px 14px;
    box-shadow: 0 2px 12px #00000008;
    margin-bottom: 20px;
  }
  .chart-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .chart-title { font-size: 0.85rem; font-weight: 600; color: #3D3229; }
  .chart-hint { font-size: 0.7rem; color: #bbb; }
  .chart-wrap { position: relative; height: 220px; }

  /* Table */
  .table-box {
    background: #fff;
    border: 1px solid #e8e0d8;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 12px #00000008;
    margin-bottom: 16px;
  }
  .table-header {
    padding: 14px 18px 10px;
    font-size: 0.8rem;
    font-weight: 600;
    color: #3D3229;
    border-bottom: 1px solid #f0ebe4;
  }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  thead tr { background: #faf8f5; }
  th {
    padding: 8px 14px;
    color: #888;
    font-weight: 600;
    white-space: nowrap;
    text-align: center;
  }
  th:first-child { text-align: left; }
  td { padding: 8px 14px; text-align: center; color: #3D3229; border-top: 1px solid #f5f0ea; }
  td:first-child { text-align: left; color: #555; font-family: monospace; font-size: 0.78rem; }
  tr.last-row td { font-weight: 700; }
  .null-val { color: #ccc; }
  .up { font-size: 0.68rem; color: #b85c33; margin-left: 4px; }
  .dn { font-size: 0.68rem; color: #5a7a50; margin-left: 4px; }

  /* Summary bar */
  .summary-bar {
    background: #3D3229;
    border-radius: 14px;
    padding: 14px 18px;
  }
  .summary-label { font-size: 0.7rem; color: #8B9E7E; letter-spacing: 1px; margin-bottom: 8px; }
  .summary-items { display: flex; gap: 20px; flex-wrap: wrap; }
  .summary-item-label { font-size: 0.7rem; color: #aaa; margin-bottom: 2px; }
  .summary-item-val {
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Playfair Display', serif;
  }
  .summary-good { color: #8B9E7E; }
  .summary-bad  { color: #C17F59; }
  .summary-na   { color: #666; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-sub">Abby Eat Life</div>
    <div class="header-title">學生數據趨勢追蹤</div>
  </div>
  <button class="btn-reset" id="btnReset" onclick="resetAll()">重新輸入</button>
</div>

<div class="content">

  <!-- Input Panel -->
  <div class="input-card" id="inputCard">
    <div class="input-field-wrap">
      <label class="field-label">學生姓名（選填）</label>
      <input type="text" id="studentName" placeholder="例：Meggy">
    </div>
    <div class="input-field-wrap">
      <label class="field-label">
        貼入數據
        <span>（每行：日期 → 體重 → 體脂率 → 腰圍，Tab 或逗號分隔）</span>
      </label>
      <textarea id="rawData" rows="7"
        placeholder="2025/01/06&#9;58.2&#9;28.4&#9;79&#10;2025/01/20&#9;57.8&#9;&#9;78&#10;..."
        oninput="onDataInput()"></textarea>
    </div>
    <div class="hint">✦ 直接從 Excel 全選複製貼上即可，不需要調整格式；體脂率或腰圍可以空白</div>
    <div class="btn-row">
      <button class="btn-sample" onclick="loadSample()">載入範例</button>
      <button class="btn-load" id="btnLoad" onclick="loadData()">請貼入數據</button>
    </div>
  </div>

  <!-- Chart Area -->
  <div class="chart-area" id="chartArea">
    <div class="student-header">
      <div class="student-name" id="displayName"></div>
      <div class="student-period" id="displayPeriod"></div>
    </div>

    <div class="metric-cards" id="metricCards"></div>

    <div class="chart-box">
      <div class="chart-header">
        <span class="chart-title" id="chartTitle"></span>
        <span class="chart-hint">— 虛線為趨勢方向</span>
      </div>
      <div class="chart-wrap">
        <canvas id="myChart"></canvas>
      </div>
    </div>

    <div class="table-box">
      <div class="table-header">數據明細</div>
      <div class="table-scroll">
        <table id="dataTable"></table>
      </div>
    </div>

    <div class="summary-bar">
      <div class="summary-label">整體變化摘要</div>
      <div class="summary-items" id="summaryItems"></div>
    </div>
  </div>

</div>

<script>
const METRICS = [
  { key: 'weight', label: '體重',  unit: 'kg', color: '#8B9E7E' },
  { key: 'fat',    label: '體脂率', unit: '%',  color: '#C17F59' },
  { key: 'waist',  label: '腰圍',  unit: 'cm', color: '#7BAFC4' },
];

const SAMPLE = "2025/01/06\t58.2\t28.4\t79\n2025/01/20\t57.8\t\t78\n2025/02/03\t57.1\t27.2\t77.5\n2025/02/17\t56.5\t\t76\n2025/03/03\t56.0\t26.1\t75.5\n2025/03/17\t55.4\t25.6\t74.5";

let chartData = [];
let activeMetric = 'weight';
let chartInstance = null;

// ── Parse ─────────────────────────────────────────────────────────────
function parseData(raw) {
  const rows = raw.trim().split('\n').filter(Boolean);
  const results = [];
  for (const row of rows) {
    const cells = row.split(/[\t,，]/).map(c => c.trim());
    if (cells.length < 2) continue;
    const [dateRaw, w, f, wa] = cells;
    const weight = parseFloat(w);
    if (!dateRaw || isNaN(weight)) continue;
    const fat   = (f  !== undefined && f  !== '') ? parseFloat(f)  : null;
    const waist = (wa !== undefined && wa !== '') ? parseFloat(wa) : null;
    const fatVal   = (fat   !== null && !isNaN(fat))   ? fat   : null;
    const waistVal = (waist !== null && !isNaN(waist)) ? waist : null;
    let dateLabel = dateRaw;
    const full  = dateRaw.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
    const short = dateRaw.match(/^(\d{1,2})[\/\-](\d{1,2})$/);
    if (full)  dateLabel = `${full[2]}/${full[3]}`;
    else if (short) dateLabel = `${short[1]}/${short[2]}`;
    results.push({ date: dateLabel, weight, fat: fatVal, waist: waistVal });
  }
  return results;
}

// ── Trend ─────────────────────────────────────────────────────────────
function calcTrend(data, key) {
  const valid = data.map((d,i) => ({i, v: d[key]})).filter(x => x.v !== null && x.v !== undefined);
  if (valid.length < 2) return data.map(() => null);
  const n = valid.length;
  const xs = valid.map(x => x.i), ys = valid.map(x => x.v);
  const mx = xs.reduce((a,b)=>a+b,0)/n, my = ys.reduce((a,b)=>a+b,0)/n;
  const num = xs.reduce((acc,x,i)=>acc+(x-mx)*(ys[i]-my),0);
  const den = xs.reduce((acc,x)=>acc+(x-mx)**2,0);
  const slope = num/den, intercept = my - slope*mx;
  return data.map((d,i) =>
    (d[key] !== null && d[key] !== undefined) ? parseFloat((slope*i+intercept).toFixed(2)) : null
  );
}

// ── UI helpers ────────────────────────────────────────────────────────
function onDataInput() {
  const parsed = parseData(document.getElementById('rawData').value);
  const btn = document.getElementById('btnLoad');
  if (parsed.length > 0) {
    btn.textContent = `產生趨勢圖（${parsed.length} 筆）`;
    btn.classList.add('ready');
  } else {
    btn.textContent = '請貼入數據';
    btn.classList.remove('ready');
  }
}

function loadSample() {
  document.getElementById('rawData').value = SAMPLE;
  document.getElementById('studentName').value = '範例學生';
  onDataInput();
}

function loadData() {
  const parsed = parseData(document.getElementById('rawData').value);
  if (!parsed.length) return;
  chartData = parsed;
  activeMetric = 'weight';
  document.getElementById('inputCard').style.display = 'none';
  document.getElementById('btnReset').style.display = 'block';
  document.getElementById('chartArea').style.display = 'block';
  renderAll();
}

function resetAll() {
  document.getElementById('inputCard').style.display = 'block';
  document.getElementById('btnReset').style.display = 'none';
  document.getElementById('chartArea').style.display = 'none';
  document.getElementById('rawData').value = '';
  document.getElementById('studentName').value = '';
  onDataInput();
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  chartData = [];
}

// ── Render all ────────────────────────────────────────────────────────
function renderAll() {
  const name = document.getElementById('studentName').value || '學生';
  document.getElementById('displayName').textContent = name;
  document.getElementById('displayPeriod').textContent =
    `${chartData[0].date} → ${chartData[chartData.length-1].date}　共 ${chartData.length} 次測量`;
  renderCards();
  renderChart();
  renderTable();
  renderSummary();
}

function renderCards() {
  const container = document.getElementById('metricCards');
  container.innerHTML = '';
  METRICS.forEach(m => {
    const valid = chartData.filter(d => d[m.key] !== null && d[m.key] !== undefined);
    const latest = valid.length ? valid[valid.length-1][m.key] : null;
    const isActive = m.key === activeMetric;

    // delta badge
    let badgeHTML = '';
    if (valid.length >= 2) {
      const delta = valid[valid.length-1][m.key] - valid[0][m.key];
      const sign = delta > 0 ? '+' : '';
      const cls  = delta < 0 ? 'delta-good' : 'delta-bad';
      badgeHTML = `<span class="delta-badge ${cls}">${sign}${delta.toFixed(1)}${m.unit}</span>`;
    }

    const card = document.createElement('button');
    card.className = 'metric-card' + (isActive ? ' active' : '');
    card.style.setProperty('--card-shadow', m.color + '30');
    if (isActive) {
      card.style.border = `2px solid ${m.color}`;
      card.style.background = m.color + '18';
    }
    card.innerHTML = `
      <div class="metric-label">${m.label}</div>
      <div class="metric-value">
        ${latest !== null ? latest.toFixed(1) : '—'}
        <span class="metric-unit">${m.unit}</span>
      </div>
      ${badgeHTML}
    `;
    card.onclick = () => { activeMetric = m.key; renderAll(); };
    container.appendChild(card);
  });
}

function renderChart() {
  const m = METRICS.find(x => x.key === activeMetric);
  document.getElementById('chartTitle').textContent = `${m.label} 趨勢`;

  const labels = chartData.map(d => d.date);
  const values = chartData.map(d => d[activeMetric]);
  const trend  = calcTrend(chartData, activeMetric);

  const yVals = values.filter(v => v !== null && v !== undefined);
  const yMin  = yVals.length ? Math.floor(Math.min(...yVals) - 1) : 0;
  const yMax  = yVals.length ? Math.ceil(Math.max(...yVals)  + 1) : 100;

  if (chartInstance) chartInstance.destroy();

  const ctx = document.getElementById('myChart').getContext('2d');
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: m.label,
          data: values,
          borderColor: m.color,
          backgroundColor: m.color + '18',
          borderWidth: 2.5,
          pointBackgroundColor: m.color,
          pointBorderColor: '#fff',
          pointBorderWidth: 2,
          pointRadius: 4,
          pointHoverRadius: 6,
          tension: 0.3,
          spanGaps: false,
        },
        {
          label: '趨勢',
          data: trend,
          borderColor: m.color,
          borderWidth: 1.5,
          borderDash: [5, 4],
          pointRadius: 0,
          tension: 0,
          spanGaps: true,
          borderOpacity: 0.45,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ctx.datasetIndex === 0
              ? ` ${ctx.parsed.y !== null ? ctx.parsed.y.toFixed(1) : '—'} ${m.unit}`
              : null,
            title: ctx => ctx[0].label,
          },
          filter: item => item.datasetIndex === 0 && item.parsed.y !== null,
          backgroundColor: '#fff',
          titleColor: '#999',
          bodyColor: m.color,
          bodyFont: { size: 14, weight: 'bold' },
          borderColor: '#e8e0d8',
          borderWidth: 1,
          padding: 10,
          boxShadow: '0 4px 16px #00000015',
        }
      },
      scales: {
        x: {
          grid: { color: '#f0ebe4' },
          border: { display: false },
          ticks: { color: '#aaa', font: { size: 11, family: "'Noto Sans TC', sans-serif" } }
        },
        y: {
          min: yMin, max: yMax,
          grid: { color: '#f0ebe4' },
          border: { display: false },
          ticks: {
            color: '#aaa',
            font: { size: 11, family: "'Noto Sans TC', sans-serif" },
            callback: v => `${v}${m.unit}`
          }
        }
      }
    }
  });
}

function renderTable() {
  const table = document.getElementById('dataTable');
  const headers = ['日期', '體重 (kg)', '體脂率 (%)', '腰圍 (cm)'];
  let html = `<thead><tr>${headers.map((h,i) =>
    `<th style="${i===0?'text-align:left':''}">${h}</th>`
  ).join('')}</tr></thead><tbody>`;

  chartData.forEach((row, i) => {
    const prev = i > 0 ? chartData[i-1] : null;
    const isLast = i === chartData.length - 1;
    html += `<tr class="${isLast ? 'last-row' : ''}">`;
    html += `<td>${row.date}</td>`;
    METRICS.forEach(m => {
      const val = row[m.key];
      const prevVal = prev ? prev[m.key] : null;
      const delta = (val !== null && val !== undefined && prevVal !== null && prevVal !== undefined)
        ? val - prevVal : null;
      let deltaHTML = '';
      if (delta !== null && delta !== 0) {
        deltaHTML = delta > 0
          ? `<span class="up">▲${Math.abs(delta).toFixed(1)}</span>`
          : `<span class="dn">▼${Math.abs(delta).toFixed(1)}</span>`;
      }
      html += `<td>${val !== null && val !== undefined
        ? val.toFixed(1) + deltaHTML
        : '<span class="null-val">—</span>'}</td>`;
    });
    html += `</tr>`;
  });
  html += '</tbody>';
  table.innerHTML = html;
}

function renderSummary() {
  const container = document.getElementById('summaryItems');
  container.innerHTML = '';
  METRICS.forEach(m => {
    const valid = chartData.filter(d => d[m.key] !== null && d[m.key] !== undefined);
    const div = document.createElement('div');
    div.innerHTML = `<div class="summary-item-label">${m.label}</div>`;
    if (valid.length < 2) {
      div.innerHTML += `<div class="summary-item-val summary-na">—</div>`;
    } else {
      const delta = valid[valid.length-1][m.key] - valid[0][m.key];
      const cls = delta < 0 ? 'summary-good' : 'summary-bad';
      const sign = delta > 0 ? '+' : '';
      div.innerHTML += `<div class="summary-item-val ${cls}">${sign}${delta.toFixed(1)} ${m.unit}</div>`;
    }
    container.appendChild(div);
  });
}
</script>
</body>
</html>
