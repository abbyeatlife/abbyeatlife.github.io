<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>初次對焦｜Abby Eat Life</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Playfair+Display:ital@0;1&display=swap');

  :root {
    --sage: #8B9E7E;
    --sage-dark: #5a7050;
    --terracotta: #C17F59;
    --cream: #FDFBF7;
    --bark: #3D3229;
    --bark-light: #6b5a4e;
    --border: #e2ddd8;
    --card: #ffffff;
    --shadow: 0 1px 12px rgba(61,50,41,0.07);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--cream);
    color: var(--bark);
    line-height: 1.7;
    font-size: 15px;
    min-height: 100vh;
  }

  /* ── Top bar ── */
  .topbar {
    background: var(--sage-dark);
    color: white;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .topbar-brand {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    letter-spacing: 1px;
    opacity: 0.95;
  }
  .topbar-date {
    font-size: 13px;
    opacity: 0.75;
  }

  /* ── Main layout ── */
  .page { max-width: 680px; margin: 0 auto; padding: 32px 20px 60px; }

  /* ── Section title ── */
  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Card ── */
  .card {
    background: var(--card);
    border-radius: 14px;
    padding: 24px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    margin-bottom: 20px;
  }

  /* ── Name / Age row ── */
  .name-row {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 14px;
  }

  /* ── Metrics grid ── */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  @media (max-width: 480px) {
    .metrics-grid { grid-template-columns: repeat(2, 1fr); }
    .name-row { grid-template-columns: 1fr 1fr; }
  }

  .metric-box {
    background: #f8f6f2;
    border-radius: 10px;
    padding: 14px 12px;
    text-align: center;
    border: 1px solid var(--border);
  }
  .metric-box.highlight {
    background: linear-gradient(135deg, #f0f5ed, #e8f0e4);
    border-color: #c3d9b8;
  }
  .metric-box label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--sage);
    margin-bottom: 7px;
    text-transform: uppercase;
  }
  .metric-box input {
    width: 100%;
    border: none;
    background: transparent;
    font-size: 22px;
    font-weight: 700;
    color: var(--bark);
    text-align: center;
    font-family: inherit;
    outline: none;
    padding: 0;
  }
  .metric-box input::placeholder { color: #ccc; font-weight: 400; font-size: 18px; }
  .metric-box input[readonly] { color: var(--sage-dark); font-size: 20px; }
  .metric-box .unit {
    font-size: 11px;
    color: var(--bark-light);
    margin-top: 3px;
    opacity: 0.7;
  }

  /* ── Weight row ── */
  .weight-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  @media (max-width: 480px) { .weight-row { grid-template-columns: repeat(3, 1fr); } }

  .wt-box {
    border-radius: 10px;
    padding: 12px 10px;
    text-align: center;
    border: 1.5px solid var(--border);
    background: white;
    position: relative;
  }
  .wt-box::before {
    content: '';
    display: block;
    width: 32px;
    height: 3px;
    border-radius: 2px;
    margin: 0 auto 8px;
  }
  .wt-box.now::before   { background: var(--terracotta); }
  .wt-box.best::before  { background: var(--sage); }
  .wt-box.goal::before  { background: var(--sage-dark); }
  .wt-box label {
    display: block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--bark-light);
    margin-bottom: 6px;
  }
  .wt-box input {
    width: 100%;
    border: none;
    background: transparent;
    font-size: 24px;
    font-weight: 700;
    text-align: center;
    font-family: inherit;
    outline: none;
    padding: 0;
  }
  .wt-box.now input   { color: var(--terracotta); }
  .wt-box.best input  { color: var(--sage-dark); }
  .wt-box.goal input  { color: var(--bark); }
  .wt-box input::placeholder { color: #ddd; font-weight: 400; font-size: 18px; }
  .wt-box .unit { font-size: 11px; color: var(--bark-light); opacity: 0.6; margin-top: 2px; }

  /* ── Field ── */
  .field { margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--sage-dark);
    margin-bottom: 6px;
  }
  .field input[type="text"],
  .field input[type="number"] {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 9px;
    font-size: 15px;
    font-family: inherit;
    background: white;
    color: var(--bark);
    outline: none;
    transition: border-color 0.18s;
  }
  .field input:focus { border-color: var(--sage); }

  /* ── Notepad textarea ── */
  .notepad {
    width: 100%;
    padding: 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    background: white;
    color: var(--bark);
    outline: none;
    resize: vertical;
    min-height: 120px;
    line-height: 1.8;
    transition: border-color 0.18s;
  }
  .notepad:focus { border-color: var(--sage); }
  .notepad.large { min-height: 160px; }

  /* ── Chief complaint ── */
  .chief-box {
    background: linear-gradient(135deg, #fdf8f3, #faf4ee);
    border: 1.5px solid #e8d5c0;
    border-radius: 12px;
    padding: 18px;
  }
  .chief-box label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--terracotta);
    display: block;
    margin-bottom: 8px;
  }
  .chief-box input {
    width: 100%;
    border: none;
    background: transparent;
    font-size: 16px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--bark);
    outline: none;
    line-height: 1.6;
  }
  .chief-box input::placeholder { color: #cbb89a; }

  /* ── Spacer ── */
  .spacer { height: 8px; }

  /* ── Save button ── */
  .save-wrap { margin-top: 28px; }
  .save-btn {
    display: block;
    width: 100%;
    padding: 15px;
    background: var(--sage-dark);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.2s, transform 0.1s;
    box-shadow: 0 4px 14px rgba(90,112,80,0.25);
  }
  .save-btn:hover { background: var(--sage); }
  .save-btn:active { transform: scale(0.99); }
  .save-btn:disabled { background: #b0b0a8; box-shadow: none; cursor: not-allowed; }

  .save-status {
    text-align: center;
    margin-top: 10px;
    font-size: 13px;
    font-weight: 500;
    min-height: 20px;
  }
  .save-status.ok  { color: var(--sage-dark); }
  .save-status.err { color: var(--terracotta); }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 24px 0 0;
    font-size: 12px;
    color: var(--bark-light);
    opacity: 0.5;
    font-family: 'Playfair Display', serif;
    font-style: italic;
  }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-brand">Abby Eat Life｜初次對焦</span>
  <span class="topbar-date" id="today-date"></span>
</div>

<div class="page">

  <!-- ① 基本資料 -->
  <div class="section-title">基本資料</div>
  <div class="card">
    <div class="name-row">
      <div class="field">
        <label>姓名</label>
        <input type="text" id="name" placeholder="學員姓名">
      </div>
      <div class="field">
        <label>年齡</label>
        <input type="number" id="age" placeholder="歲" min="10" max="99">
      </div>
    </div>
  </div>

  <!-- ② 體態數據 -->
  <div class="section-title">體態數據</div>
  <div class="card">
    <div class="metrics-grid" style="margin-bottom:14px;">
      <div class="metric-box">
        <label>身高</label>
        <input type="number" id="height" placeholder="162" step="0.5">
        <div class="unit">cm</div>
      </div>
      <div class="metric-box">
        <label>體重</label>
        <input type="number" id="weight" placeholder="52" step="0.1">
        <div class="unit">kg</div>
      </div>
      <div class="metric-box highlight">
        <label>BMI</label>
        <input type="text" id="bmi" placeholder="—" readonly>
        <div class="unit">自動</div>
      </div>
      <div class="metric-box">
        <label>體脂率</label>
        <input type="number" id="bf" placeholder="24" step="0.1">
        <div class="unit">%</div>
      </div>
      <div class="metric-box">
        <label>腰圍</label>
        <input type="number" id="waist" placeholder="70" step="0.5">
        <div class="unit">cm</div>
      </div>
      <div class="metric-box">
        <label>其他</label>
        <input type="text" id="other-metric" placeholder="自填" style="font-size:14px;">
        <div class="unit">骨骼肌/內臟脂等</div>
      </div>
    </div>

    <div class="weight-row">
      <div class="wt-box now">
        <label>目前</label>
        <input type="number" id="wt-now" placeholder="52" step="0.1">
        <div class="unit">kg</div>
      </div>
      <div class="wt-box best">
        <label>最輕/維持</label>
        <input type="number" id="wt-best" placeholder="46" step="0.1">
        <div class="unit">kg</div>
      </div>
      <div class="wt-box goal">
        <label>目標</label>
        <input type="number" id="wt-goal" placeholder="48" step="0.1">
        <div class="unit">kg</div>
      </div>
    </div>
  </div>

  <!-- ③ 主訴 -->
  <div class="section-title">主訴</div>
  <div class="card">
    <div class="chief-box">
      <label>今天來找我，最想解決的一件事</label>
      <input type="text" id="chief" placeholder="一句話說出核心困擾…">
    </div>
  </div>

  <!-- ④ 面談筆記 -->
  <div class="section-title">面談筆記</div>
  <div class="card">
    <textarea class="notepad large" id="notes" placeholder="自由記錄——飲食習慣、運動狀況、壓力來源…"></textarea>
  </div>

  <!-- ⑤ 初步評估 -->
  <div class="section-title">初步評估</div>
  <div class="card">
    <textarea class="notepad" id="assessment" placeholder="問題點在哪？可能的方向是什麼？"></textarea>
  </div>

  <!-- ⑥ 行動計畫 -->
  <div class="section-title">行動計畫</div>
  <div class="card">
    <textarea class="notepad" id="action" placeholder="第一步做什麼？下次何時見？"></textarea>
  </div>

  <!-- 儲存 -->
  <div class="save-wrap">
    <button class="save-btn" id="save-btn" onclick="saveToSheets()">儲存到 Google Sheets</button>
    <div class="save-status" id="save-status"></div>
  </div>

  <div class="footer">Abby Eat Life — 學員初次對焦記錄</div>

</div><!-- /page -->

<script>
  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxe-a1kQmmGKDiMCL6srfeSPlFcmEQAkHAShznesWrfADZxfVNSU5D9Dv_iB7l_KvrSrw/exec';

  // ── Today's date ──
  const today = new Date();
  document.getElementById('today-date').textContent =
    today.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });

  // ── BMI auto calc ──
  function calcBMI() {
    const h = parseFloat(document.getElementById('height').value);
    const w = parseFloat(document.getElementById('weight').value);
    if (h && w) {
      document.getElementById('bmi').value = (w / (h/100) ** 2).toFixed(1);
      // sync weight to wt-now
      if (!document.getElementById('wt-now').value) {
        document.getElementById('wt-now').value = w;
      }
    } else {
      document.getElementById('bmi').value = '';
    }
  }
  document.getElementById('height').addEventListener('input', calcBMI);
  document.getElementById('weight').addEventListener('input', calcBMI);

  // ── Save ──
  function saveToSheets() {
    const btn    = document.getElementById('save-btn');
    const status = document.getElementById('save-status');
    const name   = document.getElementById('name').value.trim();

    if (!name) {
      status.textContent = '請填入學員姓名再儲存';
      status.className = 'save-status err';
      return;
    }

    const payload = {
      '日期':     today.toLocaleDateString('zh-TW'),
      '姓名':     name,
      '年齡':     document.getElementById('age').value,
      '身高':     document.getElementById('height').value,
      '體重':     document.getElementById('weight').value,
      'BMI':      document.getElementById('bmi').value,
      '體脂率':   document.getElementById('bf').value,
      '腰圍':     document.getElementById('waist').value,
      '其他數值': document.getElementById('other-metric').value,
      '目前體重': document.getElementById('wt-now').value,
      '最輕維持': document.getElementById('wt-best').value,
      '目標體重': document.getElementById('wt-goal').value,
      '主訴':     document.getElementById('chief').value,
      '面談筆記': document.getElementById('notes').value,
      '初步評估': document.getElementById('assessment').value,
      '行動計畫': document.getElementById('action').value,
    };

    btn.disabled = true;
    btn.textContent = '儲存中…';
    status.textContent = '';
    status.className = 'save-status';

    fetch(SHEET_URL, { method: 'POST', body: JSON.stringify(payload) })
      .then(r => r.json())
      .then(data => {
        if (data.status === 'success') {
          btn.textContent = '✓ 已儲存';
          status.textContent = name + ' 的記錄已寫入 Google Sheets';
          status.className = 'save-status ok';
        } else { throw new Error(); }
      })
      .catch(() => {
        btn.disabled = false;
        btn.textContent = '儲存到 Google Sheets';
        status.textContent = '儲存失敗，請再試一次';
        status.className = 'save-status err';
      });
  }
</script>
</body>
</html>
