<title>這餐吃了什麼？熱量與三大營養素計算（離線版）</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sage: #8B9E7E;
  --terra: #C17F59;
  --cream: #FDFBF7;
  --bark: #3D3229;
  --bark-light: #6B5A4E;
  --border: rgba(61,50,41,0.12);
  --border-med: rgba(61,50,41,0.22);
  --bg-secondary: rgba(61,50,41,0.05);
  --cal: #D85A30;
  --pro: #3B6D11;
  --fat: #BA7517;
  --carb: #185FA5;
  --radius-md: 8px;
  --radius-lg: 12px;
}
html { background: var(--cream); color: var(--bark); font-family: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif; font-size: 14px; }
body { max-width: 700px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

h1 { font-size: 18px; font-weight: 500; margin-bottom: 3px; }
.subtitle { font-size: 12px; color: var(--bark-light); margin-bottom: 1.5rem; }

.section-card { background: #fff; border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 10px; }
.section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.section-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.section-title { font-weight: 500; font-size: 14px; }
.section-hint { font-size: 11px; color: var(--bark-light); margin-left: auto; }
.food-rows { display: flex; flex-direction: column; gap: 8px; }

.food-row { display: flex; align-items: flex-start; gap: 8px; position: relative; }
.input-wrap { flex: 1; min-width: 0; position: relative; }
.food-name-input {
  width: 100%; font-size: 13px; padding: 6px 10px;
  border: 0.5px solid var(--border-med); border-radius: var(--radius-md);
  background: var(--cream); color: var(--bark); height: 34px; font-family: inherit;
}
.food-name-input:focus { outline: none; border-color: var(--sage); }
.food-name-input.not-found { border-color: #E8A87C; background: #FFF8F4; }
.food-name-input.found { border-color: var(--sage); }

.autocomplete-list {
  position: absolute; top: 36px; left: 0; right: 0; z-index: 100;
  background: #fff; border: 0.5px solid var(--border-med); border-radius: var(--radius-md);
  box-shadow: 0 4px 16px rgba(0,0,0,0.08); max-height: 200px; overflow-y: auto;
}
.autocomplete-item {
  padding: 7px 12px; cursor: pointer; font-size: 12px; display: flex; justify-content: space-between; align-items: center; gap: 8px;
}
.autocomplete-item:hover, .autocomplete-item.active { background: var(--bg-secondary); }
.autocomplete-item .food-label { color: var(--bark); }
.autocomplete-item .food-meta { color: var(--bark-light); font-size: 11px; white-space: nowrap; }

.g-input {
  width: 68px; font-size: 13px; padding: 6px 8px;
  border: 0.5px solid var(--border-med); border-radius: var(--radius-md);
  background: var(--cream); color: var(--bark); height: 34px; text-align: right; font-family: inherit;
}
.g-input:focus { outline: none; border-color: var(--sage); }
.unit-label { font-size: 12px; color: var(--bark-light); line-height: 34px; flex-shrink: 0; }
.del-btn { background: none; border: none; cursor: pointer; color: var(--bark-light); font-size: 17px; line-height: 34px; padding: 0 4px; opacity: 0.4; flex-shrink: 0; }
.del-btn:hover { opacity: 1; color: var(--cal); }
.not-found-hint { font-size: 11px; color: #BA7517; margin-top: 3px; padding-left: 2px; }

.add-btn {
  font-size: 12px; color: var(--bark-light); background: none;
  border: 0.5px dashed var(--border-med); border-radius: var(--radius-md);
  padding: 5px 12px; cursor: pointer; margin-top: 4px; font-family: inherit;
}
.add-btn:hover { background: var(--bg-secondary); }

.calc-btn {
  width: 100%; padding: 11px; background: var(--bark); color: var(--cream);
  border: none; border-radius: var(--radius-md); font-size: 14px; font-weight: 500;
  cursor: pointer; margin: 8px 0 20px; font-family: inherit; letter-spacing: 0.02em;
}
.calc-btn:hover { background: var(--bark-light); }
.calc-btn:active { transform: scale(0.99); }

.result-wrap { background: var(--bg-secondary); border-radius: var(--radius-lg); padding: 1.25rem; }
.metric-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; margin-bottom: 1rem; }
.metric { background: #fff; border-radius: var(--radius-md); padding: 10px; text-align: center; border: 0.5px solid var(--border); }
.metric-label { font-size: 11px; color: var(--bark-light); margin-bottom: 4px; }
.metric-val { font-size: 21px; font-weight: 500; }
.metric-unit { font-size: 11px; color: var(--bark-light); }

.macro-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; font-size: 12px; }
.macro-label { width: 62px; color: var(--bark-light); flex-shrink: 0; }
.macro-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.macro-fill { height: 100%; border-radius: 4px; transition: width .5s ease; }
.macro-num { width: 44px; text-align: right; font-variant-numeric: tabular-nums; font-weight: 500; }

.breakdown-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 4px; }
.breakdown-table th { text-align: left; padding: 5px 8px; border-bottom: 0.5px solid var(--border); color: var(--bark-light); font-weight: 500; }
.breakdown-table td { padding: 5px 8px; border-bottom: 0.5px solid var(--border); }
.breakdown-table tr:last-child td { border-bottom: none; }
.result-note { font-size: 11px; color: var(--bark-light); margin-top: 12px; line-height: 1.7; }
.error-msg { color: var(--cal); font-size: 12px; padding: 8px 12px; background: #FFF0EB; border-radius: var(--radius-md); margin-bottom: 8px; }

.cal-c { color: var(--cal); }
.pro-c { color: var(--pro); }
.fat-c { color: var(--fat); }
.carb-c { color: var(--carb); }

.db-badge { display: inline-block; font-size: 10px; background: #EAF3DE; color: #3B6D11; padding: 2px 8px; border-radius: 10px; margin-left: 8px; vertical-align: middle; }

@media (max-width: 480px) {
  .metric-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .section-hint { display: none; }
}
</style>
</head>

  {name:'甜不辣',       aliases:['關東煮甜不辣'],                      cal:140, pro:10, fat:4,  carb:17},
  {name:'貢丸',         aliases:['豬肉貢丸'],                          cal:240, pro:13, fat:17, carb:8},
  {name:'熱狗',         aliases:['香腸（熱狗）'],                      cal:290, pro:12, fat:25, carb:5},
  {name:'台式香腸',     aliases:['香腸'],                              cal:345, pro:16, fat:28, carb:7},
  {name:'培根',         aliases:['bacon'],                             cal:417, pro:12, fat:42, carb:1},
  {name:'水餃',         aliases:['水餃（熟）'],                        cal:200, pro:9,  fat:7,  carb:26},
  {name:'鍋貼',         aliases:['煎餃'],                              cal:230, pro:8,  fat:9,  carb:30},
  {name:'便當白飯',     aliases:['便當飯'],                            cal:183, pro:3,  fat:0,  carb:40},
  {name:'滷蛋',         aliases:['滷雞蛋'],                            cal:155, pro:13, fat:10, carb:3},
];

// ── Build search index ──────────────────────────────────
const SEARCH_IDX = [];
DB.forEach((item, i) => {
  SEARCH_IDX.push({text: item.name.toLowerCase(), idx: i, label: item.name});
  (item.aliases||[]).forEach(a => SEARCH_IDX.push({text: a.toLowerCase(), idx: i, label: item.name}));
});

function search(q) {
  if (!q || q.length < 1) return [];
  const lq = q.toLowerCase();
  const seen = new Set();
  const results = [];
  // Exact prefix match first
  SEARCH_IDX.forEach(e => {
    if (e.text.startsWith(lq) && !seen.has(e.idx)) {
      seen.add(e.idx); results.push(e.idx);
    }
  });
  // Then contains match
  SEARCH_IDX.forEach(e => {
    if (e.text.includes(lq) && !seen.has(e.idx)) {
      seen.add(e.idx); results.push(e.idx);
    }
  });
  return results.slice(0, 8).map(i => DB[i]);
}

function lookupExact(name) {
  const lname = name.toLowerCase().trim();
  for (let item of DB) {
    if (item.name.toLowerCase() === lname) return item;
    if ((item.aliases||[]).some(a => a.toLowerCase() === lname)) return item;
  }
  return null;
}

// ── Sections config ─────────────────────────────────────
const SECTIONS = [
  {id:'grain',   label:'主食類',     dot:'#EF9F27', hint:'白飯、麵條、地瓜…',         rows:[{name:'白飯',g:200}]},
  {id:'protein', label:'豆魚蛋肉類', dot:'#F0997B', hint:'雞胸、豆腐、蛋、魚…',       rows:[{name:'雞胸肉（去皮）',g:60},{name:'毛豆',g:60}]},
  {id:'fat',     label:'油脂類',     dot:'#FAC775', hint:'烹調油、堅果、酪梨…',        rows:[{name:'烹調油',g:10}]},
  {id:'veg',     label:'蔬菜類',     dot:'#97C459', hint:'各式蔬菜、菇類…',            rows:[{name:'蔬菜（混合）',g:100}]},
  {id:'fruit',   label:'水果類',     dot:'#85B7EB', hint:'蘋果、香蕉、芭樂…',          rows:[]},
  {id:'snack',   label:'點心／其他', dot:'#F5C4B3', hint:'蛋糕、餅乾、飲料…',          rows:[]},
];

let rowCounter = 0;

function renderSections() {
  const c = document.getElementById('sections-container');
  c.innerHTML = '';
  SECTIONS.forEach(sec => {
    const card = document.createElement('div');
    card.className = 'section-card';
    card.innerHTML = `
      <div class="section-header">
        <div class="section-dot" style="background:${sec.dot}"></div>
        <span class="section-title">${sec.label}</span>
        <span class="section-hint">${sec.hint}</span>
      </div>
      <div class="food-rows" id="rows-${sec.id}"></div>
      <button class="add-btn" onclick="addRow('${sec.id}')">+ 新增食物</button>`;
    c.appendChild(card);
    sec.rows.forEach(r => addRowWithValue(sec.id, r.name, r.g));
  });
}

function addRow(secId, name='', g='') {
  addRowWithValue(secId, name, g);
}

function addRowWithValue(secId, name, g) {
  const id = 'r' + (++rowCounter);
  const container = document.getElementById('rows-' + secId);
  const div = document.createElement('div');
  div.className = 'food-row';
  div.id = id;
  div.innerHTML = `
    <div class="input-wrap">
      <input class="food-name-input" type="text" placeholder="食物名稱（輸入可搜尋）" value="${name}" autocomplete="off"
        oninput="onNameInput(this, '${id}')"
        onblur="onNameBlur(this)"
        onkeydown="onNameKey(event, this, '${id}')">
      <div class="autocomplete-list" id="ac-${id}" style="display:none"></div>
      ${name && !lookupExact(name) ? `<div class="not-found-hint" id="hint-${id}">找不到「${name}」，請換個關鍵字</div>` : `<div class="not-found-hint" id="hint-${id}" style="display:none"></div>`}
    </div>
    <input class="g-input" type="number" min="1" max="3000" step="1" value="${g}" placeholder="0" id="g-${id}">
    <span class="unit-label">g</span>
    <button class="del-btn" onclick="document.getElementById('${id}').remove()">×</button>`;
  container.appendChild(div);
  if (name) validateName(div.querySelector('.food-name-input'), id);
}

let acActive = -1;

function onNameInput(el, rowId) {
  const q = el.value.trim();
  const results = search(q);
  const ac = document.getElementById('ac-' + rowId);
  acActive = -1;
  if (!q || results.length === 0) { ac.style.display = 'none'; return; }
  ac.innerHTML = results.map((item, i) =>
    `<div class="autocomplete-item" data-idx="${i}" onmousedown="selectItem(event,'${rowId}','${item.name}')"
      ontouchstart="selectItem(event,'${rowId}','${item.name}')">
      <span class="food-label">${item.name}</span>
      <span class="food-meta">${item.cal} kcal／蛋白${item.pro}g／脂${item.fat}g</span>
    </div>`).join('');
  ac.style.display = 'block';
  validateName(el, rowId);
}

function onNameKey(e, el, rowId) {
  const ac = document.getElementById('ac-' + rowId);
  if (ac.style.display === 'none') return;
  const items = ac.querySelectorAll('.autocomplete-item');
  if (e.key === 'ArrowDown') { e.preventDefault(); acActive = Math.min(acActive+1, items.length-1); highlightAc(items); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); acActive = Math.max(acActive-1, -1); highlightAc(items); }
  else if (e.key === 'Enter' && acActive >= 0) { e.preventDefault(); items[acActive].dispatchEvent(new MouseEvent('mousedown')); }
  else if (e.key === 'Escape') { ac.style.display = 'none'; }
}

function highlightAc(items) {
  items.forEach((el, i) => el.classList.toggle('active', i === acActive));
  if (acActive >= 0) items[acActive].scrollIntoView({block:'nearest'});
}

function selectItem(e, rowId, name) {
  e.preventDefault();
  const row = document.getElementById(rowId);
  const input = row.querySelector('.food-name-input');
  input.value = name;
  document.getElementById('ac-' + rowId).style.display = 'none';
  validateName(input, rowId);
  const gInput = row.querySelector('.g-input');
  if (!gInput.value) gInput.focus();
  else input.focus();
}

function onNameBlur(el) {
  setTimeout(() => {
    const ac = el.parentElement.querySelector('.autocomplete-list');
    if (ac) ac.style.display = 'none';
  }, 200);
}

function validateName(el, rowId) {
  const val = el.value.trim();
  const hint = document.getElementById('hint-' + rowId);
  if (!val) { el.classList.remove('found','not-found'); if(hint) hint.style.display='none'; return; }
  const found = lookupExact(val);
  el.classList.toggle('found', !!found);
  el.classList.toggle('not-found', !found);
  if (hint) {
    if (found) { hint.style.display = 'none'; }
    else { hint.textContent = `找不到「${val}」，請換個關鍵字`; hint.style.display = 'block'; }
  }
}

// ── Calculate ────────────────────────────────────────────
function calculate() {
  const resultArea = document.getElementById('result-area');
  const allRows = document.querySelectorAll('.food-row');
  const items = [];
  const notFound = [];

  allRows.forEach(row => {
    const nameEl = row.querySelector('.food-name-input');
    const gEl = row.querySelector('.g-input');
    if (!nameEl || !gEl) return;
    const name = nameEl.value.trim();
    const g = parseFloat(gEl.value);
    if (!name || !g || g <= 0) return;
    const food = lookupExact(name);
    if (!food) { notFound.push(name); return; }
    const sec = row.closest('.section-card');
    const secLabel = sec ? sec.querySelector('.section-title').textContent : '';
    const ratio = g / 100;
    items.push({
      name: food.name, section: secLabel, g,
      cal: Math.round(food.cal * ratio),
      pro: Math.round(food.pro * ratio * 10) / 10,
      fat: Math.round(food.fat * ratio * 10) / 10,
      carb: Math.round(food.carb * ratio * 10) / 10,
    });
  });

  if (items.length === 0 && notFound.length === 0) {
    resultArea.innerHTML = '<div class="error-msg">請先輸入至少一種食物和克數</div>';
    return;
  }

  const warnHtml = notFound.length > 0
    ? `<div class="error-msg">以下食物不在資料庫中，已略過：${notFound.map(n=>`「${n}」`).join('、')}。請換個關鍵字或用自動補全選取。</div>`
    : '';

  if (items.length === 0) { resultArea.innerHTML = warnHtml; return; }

  const total = {
    cal:  Math.round(items.reduce((s,i)=>s+i.cal,  0)),
    pro:  Math.round(items.reduce((s,i)=>s+i.pro,  0) * 10) / 10,
    fat:  Math.round(items.reduce((s,i)=>s+i.fat,  0) * 10) / 10,
    carb: Math.round(items.reduce((s,i)=>s+i.carb, 0) * 10) / 10,
  };

  const macroKcal = total.pro*4 + total.fat*9 + total.carb*4;
  const pPct = macroKcal > 0 ? Math.round(total.pro*4/macroKcal*100) : 0;
  const fPct = macroKcal > 0 ? Math.round(total.fat*9/macroKcal*100) : 0;
  const cPct = 100 - pPct - fPct;

  const rows = items.map(i => `<tr>
    <td>${i.name}</td>
    <td style="color:var(--bark-light);font-size:11px">${i.section}</td>
    <td style="text-align:right">${i.g}g</td>
    <td style="text-align:right" class="cal-c">${i.cal}</td>
    <td style="text-align:right" class="pro-c">${i.pro}</td>
    <td style="text-align:right" class="fat-c">${i.fat}</td>
    <td style="text-align:right" class="carb-c">${i.carb}</td>
  </tr>`).join('');

  resultArea.innerHTML = warnHtml + `
  <div class="result-wrap">
    <div class="metric-grid">
      <div class="metric"><div class="metric-label">熱量</div><div class="metric-val cal-c">${total.cal}</div><div class="metric-unit">kcal</div></div>
      <div class="metric"><div class="metric-label">蛋白質</div><div class="metric-val pro-c">${total.pro}</div><div class="metric-unit">g</div></div>
      <div class="metric"><div class="metric-label">脂肪</div><div class="metric-val fat-c">${total.fat}</div><div class="metric-unit">g</div></div>
      <div class="metric"><div class="metric-label">碳水化合物</div><div class="metric-val carb-c">${total.carb}</div><div class="metric-unit">g</div></div>
    </div>
    <div style="margin-bottom:1rem">
      <div class="macro-bar-row">
        <span class="macro-label">蛋白質 ${pPct}%</span>
        <div class="macro-track"><div class="macro-fill" style="width:${pPct}%;background:#3B6D11"></div></div>
        <span class="macro-num pro-c">${total.pro}g</span>
      </div>
      <div class="macro-bar-row">
        <span class="macro-label">脂肪 ${fPct}%</span>
        <div class="macro-track"><div class="macro-fill" style="width:${fPct}%;background:#BA7517"></div></div>
        <span class="macro-num fat-c">${total.fat}g</span>
      </div>
      <div class="macro-bar-row">
        <span class="macro-label">碳水 ${cPct}%</span>
        <div class="macro-track"><div class="macro-fill" style="width:${cPct}%;background:#185FA5"></div></div>
        <span class="macro-num carb-c">${total.carb}g</span>
      </div>
    </div>
    <div style="overflow-x:auto">
      <table class="breakdown-table">
        <thead><tr>
          <th>食物</th><th>類別</th><th style="text-align:right">重量</th>
          <th style="text-align:right" class="cal-c">熱量</th>
          <th style="text-align:right" class="pro-c">蛋白質</th>
          <th style="text-align:right" class="fat-c">脂肪</th>
          <th style="text-align:right" class="carb-c">碳水</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <p class="result-note">數值來自內建資料庫（離線版），每 100g 估算值按輸入克數換算。資料庫收錄 ${DB.length} 種食物。僅供教學示範用途。</p>
  </div>`;

  resultArea.scrollIntoView({behavior:'smooth', block:'nearest'});
}

renderSections();
</script>
</body>
</html>
