<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460" font-family="'Noto Sans TC', sans-serif">
  <defs>
    <style>text { font-family: 'Noto Sans TC', sans-serif; }</style>
  </defs>

  <!-- Background -->
  <rect width="800" height="460" fill="#FDFBF7" rx="16"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="15" font-weight="700" fill="#3D3229" letter-spacing="0.05em">月經週期荷爾蒙變化</text>

  <!-- Chart area: x=60~760, y=60~320 -->

  <!-- Menstruation zone: Day 1–5, x=60 to x=60+4*25.93=163.7 -->
  <rect x="60" y="60" width="104" height="260" fill="#8B9E7E" opacity="0.08" rx="4"/>

  <!-- Ovulation highlight zone: Day 12–15 -->
  <rect x="345" y="60" width="78" height="260" fill="#C17F59" opacity="0.10" rx="4"/>

  <!-- Ovulation zone label -->
  <text x="384" y="76" text-anchor="middle" font-size="10.5" font-weight="700" fill="#C17F59" letter-spacing="0.04em">排卵期</text>
  <text x="384" y="90" text-anchor="middle" font-size="9.5" fill="#C17F59">身體比較敏感</text>

  <!-- Menstruation zone label -->
  <text x="112" y="76" text-anchor="middle" font-size="10.5" font-weight="700" fill="#8B9E7E" letter-spacing="0.04em">月經來潮</text>
  <text x="112" y="90" text-anchor="middle" font-size="9.5" fill="#8B9E7E">Day 1–5</text>

  <!-- Grid lines -->
  <line x1="60" y1="320" x2="760" y2="320" stroke="#C2D1B3" stroke-width="1"/>
  <line x1="60" y1="260" x2="760" y2="260" stroke="#EFF3EB" stroke-width="1"/>
  <line x1="60" y1="200" x2="760" y2="200" stroke="#EFF3EB" stroke-width="1"/>
  <line x1="60" y1="140" x2="760" y2="140" stroke="#EFF3EB" stroke-width="1"/>
  <line x1="60" y1="80"  x2="760" y2="80"  stroke="#EFF3EB" stroke-width="1"/>

  <!-- Axes -->
  <line x1="60" y1="320" x2="760" y2="320" stroke="#C2D1B3" stroke-width="1.5"/>
  <line x1="60" y1="60"  x2="60"  y2="320" stroke="#C2D1B3" stroke-width="1.5"/>

  <!-- Ovulation dashed line -->
  <line x1="384" y1="100" x2="384" y2="320" stroke="#C17F59" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- ESTROGEN — sage -->
  <polyline
    points="60,284 138,272 216,248 294,200 345,152 371,176 397,212 423,200 501,188 579,176 657,212 735,272 760,284"
    fill="none" stroke="#8B9E7E" stroke-width="2.8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- LH — terracotta -->
  <polyline
    points="60,308 216,308 294,308 345,304 358,296 371,104 384,296 397,308 501,308 579,308 760,308"
    fill="none" stroke="#C17F59" stroke-width="2.8" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- PROGESTERONE — bark dashed -->
  <polyline
    points="60,314 216,314 345,314 397,314 423,308 501,248 579,152 657,212 735,296 760,314"
    fill="none" stroke="#6B5E52" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round" stroke-dasharray="6,3"/>

  <!-- X axis day labels — row 1 -->
  <text x="60"  y="336" text-anchor="middle" font-size="11" fill="#7A6E66">第1天</text>
  <text x="216" y="336" text-anchor="middle" font-size="11" fill="#7A6E66">第7天</text>
  <text x="397" y="336" text-anchor="middle" font-size="11" fill="#7A6E66">第14天</text>
  <text x="579" y="336" text-anchor="middle" font-size="11" fill="#7A6E66">第21天</text>
  <text x="760" y="336" text-anchor="middle" font-size="11" fill="#7A6E66">第28天</text>

  <!-- X axis title -->
  <text x="410" y="354" text-anchor="middle" font-size="11" fill="#7A6E66">月經週期（天）</text>

  <!-- Phase labels — row below axis title, well separated -->
  <text x="138" y="374" text-anchor="middle" font-size="10" fill="#8B9E7E">濾泡期</text>
  <text x="384" y="374" text-anchor="middle" font-size="10" fill="#C17F59">排卵</text>
  <text x="579" y="374" text-anchor="middle" font-size="10" fill="#6B5E52">黃體期</text>

  <!-- Legend -->
  <rect x="80"  y="400" width="18" height="3" fill="#8B9E7E" rx="2"/>
  <text x="104" y="406" font-size="11.5" fill="#3D3229">雌激素 Estrogen</text>

  <rect x="255" y="400" width="18" height="3" fill="#C17F59" rx="2"/>
  <text x="279" y="406" font-size="11.5" fill="#3D3229">黃體生成素 LH</text>

  <line x1="450" y1="401.5" x2="460" y2="401.5" stroke="#6B5E52" stroke-width="2.2" stroke-dasharray="4,2"/>
  <line x1="462" y1="401.5" x2="468" y2="401.5" stroke="#6B5E52" stroke-width="2.2" stroke-dasharray="4,2"/>
  <text x="474" y="406" font-size="11.5" fill="#3D3229">黃體素 Progesterone</text>

  <!-- Credit -->
  <text x="760" y="450" text-anchor="end" font-size="9" fill="#C2D1B3">abbyeatlife.github.io</text>
</svg>
